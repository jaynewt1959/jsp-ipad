name: JSPiPad

options:
  bundleIdPrefix: com.jamien
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug

packages:
  hummingbird:
    url: https://github.com/hummingbird-project/hummingbird.git
    from: "2.0.0"
  hummingbird-websocket:
    url: https://github.com/hummingbird-project/hummingbird-websocket.git
    from: "2.0.0"

schemes:
  JSPiPad:
    build:
      targets:
        JSPiPad: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  JSPiPad:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    info:
      path: JSPiPad/Info.plist
      properties:
        CFBundleDisplayName: JSP
        LSRequiresIPhoneOS: true
        UIRequiresFullScreen: true
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchIcon
        UIUserInterfaceStyle: Dark
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        ITSAppUsesNonExemptEncryption: false

    settings:
      base:
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "2"          # iPad only
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.jamien.JSPiPad
        PRODUCT_NAME: JSPiPad
        ENABLE_HARDENED_RUNTIME: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

    sources:
      - path: JSPiPad
      - path: Sources/Lesson
      - path: Sources/Server
      - path: Sources/MIDI
      - path: Assets.xcassets

    dependencies:
      - package: hummingbird
        product: Hummingbird
      - package: hummingbird-websocket
        product: HummingbirdWebSocket

    preBuildScripts:
      - name: "Build Web UI"
        script: |
          set -e
          echo "// Auto-generated — do not edit" > "$SRCROOT/JSPiPad/BuildTimestamp.swift"
          echo "let BUILD_TIMESTAMP = \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"" >> "$SRCROOT/JSPiPad/BuildTimestamp.swift"
          cd "$SRCROOT/web"
          npm install --silent
          npm run build

    postBuildScripts:
      - name: "Copy Web UI to Bundle"
        script: |
          set -e
          DEST="$BUILT_PRODUCTS_DIR/$CONTENTS_FOLDER_PATH/dist"
          rm -rf "$DEST"
          cp -r "$SRCROOT/web/dist" "$DEST"
