name: JSPiPad

options:
  bundleIdPrefix: com.jamien
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug

packages:
  hummingbird:
    url: https://github.com/hummingbird-project/hummingbird.git
    from: "2.0.0"
  hummingbird-websocket:
    url: https://github.com/hummingbird-project/hummingbird-websocket.git
    from: "2.0.0"

schemes:
  JSPiPad:
    build:
      targets:
        JSPiPad: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  JSPiPad:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    info:
      path: JSPiPad/Info.plist
      properties:
        CFBundleDisplayName: JSP
        # Versions live in build settings (MARKETING_VERSION /
        # CURRENT_PROJECT_VERSION below) — bump them there, never in
        # the generated Info.plist.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        UIRequiresFullScreen: true
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchIcon
        UIUserInterfaceStyle: Dark
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        ITSAppUsesNonExemptEncryption: false

    settings:
      base:
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "2"          # iPad only
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.jamien.JSPiPad
        PRODUCT_NAME: JSPiPad
        ENABLE_HARDENED_RUNTIME: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # App Store versioning — single source of truth. Bump
        # MARKETING_VERSION for user-facing releases and increment
        # CURRENT_PROJECT_VERSION on every App Store Connect upload.
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        # Signing — kept here so `xcodegen generate` doesn't wipe the
        # team that was previously set manually in Xcode.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 2U6V9ARN9F

    sources:
      - path: JSPiPad
      - path: Sources/Lesson
      - path: Sources/Server
      - path: Sources/MIDI
      - path: Assets.xcassets

    dependencies:
      - package: hummingbird
        product: Hummingbird
      - package: hummingbird-websocket
        product: HummingbirdWebSocket

    preBuildScripts:
      - name: "Build Web UI"
        script: |
          set -e
          echo "// Auto-generated — do not edit" > "$SRCROOT/JSPiPad/BuildTimestamp.swift"
          echo "let BUILD_TIMESTAMP = \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"" >> "$SRCROOT/JSPiPad/BuildTimestamp.swift"
          cd "$SRCROOT/web"
          npm install --silent
          # Release builds strip dev tooling (build bar, Analyze) and
          # source maps — see web/vite.config.ts.
          VITE_APP_CONFIG="$CONFIGURATION" npm run build

    postBuildScripts:
      - name: "Copy Web UI to Bundle"
        script: |
          set -e
          DEST="$BUILT_PRODUCTS_DIR/$CONTENTS_FOLDER_PATH/dist"
          rm -rf "$DEST"
          cp -r "$SRCROOT/web/dist" "$DEST"
